<div class="page-header">
  <span class="page-title">Produtos</span>
  <div class="page-header">
  
  <button class="btn-notas" (click)="irParaNotas()">
    Notas Fiscais →
  </button>
</div>
  <span class="badge-service">StockService</span>
</div>

<div class="summary-grid">
  <div class="metric">
    <div class="metric-label">Total de produtos</div>
    <div class="metric-value">{{ produtos.length }}</div>
  </div>
  <div class="metric">
    <div class="metric-label">Em estoque</div>
    <div class="metric-value ok">{{ produtosEmEstoque }}</div>
  </div>
  <div class="metric">
    <div class="metric-label">Estoque baixo</div>
    <div class="metric-value warn">{{ produtosEstoqueBaixo }}</div>
  </div>
</div>

<div class="layout">
  <div class="card">
    <div class="card-title">Novo produto</div>
    <form (ngSubmit)="cadastrarProduto()">
      <div class="form-group">
        <label class="form-label">Código</label>
        <input class="form-input" type="text" [(ngModel)]="produto.code" name="code" placeholder="Ex: 001" required>
      </div>
      <div class="form-group">
        <label class="form-label">Descrição</label>
        <input class="form-input" type="text" [(ngModel)]="produto.description" name="description" placeholder="Nome do produto" required>
      </div>
      <div class="form-group">
        <label class="form-label">Preço (R$)</label>
        <input class="form-input" type="number" [(ngModel)]="produto.price" name="price" placeholder="0,00" required>
      </div>
      <div class="form-group">
        <label class="form-label">Estoque</label>
        <input class="form-input" type="number" [(ngModel)]="produto.balance" name="balance" placeholder="Qtd. disponível" required>
      </div>
      <button type="submit" class="btn-primary">Cadastrar produto</button>
    </form>
  </div>

  <div class="card">
    <div class="card-title">Lista de produtos</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:80px">Código</th>
            <th>Descrição</th>
            <th style="width:110px">Preço</th>
            <th style="width:110px">Estoque</th>
            <th style="width:44px"></th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let p of produtos">
            <td><span class="code-badge">{{ p.code }}</span></td>
            <td>{{ p.description }}</td>
            <td>{{ p.price | currency:'BRL':'symbol':'1.2-2' }}</td>
            <td>
              <span class="stock-pill"
                [class.stock-ok]="p.balance > 20"
                [class.stock-low]="p.balance > 0 && p.balance <= 20"
                [class.stock-out]="p.balance === 0">
                {{ p.balance }} un
              </span>
            </td>
            <td>
              <button class="btn-del" (click)="deletarProduto(p.id)" title="Remover">✕</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
